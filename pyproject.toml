[project]
name = "generative-lexical-semantics"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
# Single unified env for both machines. vLLM >=0.23 supports transformers 5.x
# and pins torch 2.11.0, which the training stack accepts -- so the trainer
# (GRPOTrainer) and the rollout server (`trl vllm-serve`) share one dependency
# set. The train machine gets vLLM's NCCL weight-sync classes natively; no need
# for the old train/infer conflict split.
dependencies = [
    # shared (datasets, logging, wordnet helpers)
    "datasets>=4.8.0",
    "tqdm>=4.5.0",
    "wandb>=0.23.1",
    "wn>=0.9",
    "rapidfuzz>=3.14.5",
    # training: GRPO trainer + LoRA
    "accelerate>=1.4.0",
    "transformers>=5.3.0",
    "torch>=2.11.0",
    "torchvision>=0.26.0",
    "trl>=1.6.0",
    "liger-kernel>=0.7.0",
    # rollout / inference: vLLM generation server (`trl vllm-serve`)
    "vllm>=0.23.0",
    "flashinfer-python>=0.6.12",
]

[tool.uv.sources]
# Pull torch (and friends) from the CUDA 12.6 wheel index instead of PyPI, so
# their CUDA builds stay ABI-compatible with each other.
torch = [{ index = "pytorch-cu126" }]
torchvision = [{ index = "pytorch-cu126" }]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true
